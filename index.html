<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Redirecting to DBPort...</title>
    <!-- Immediate redirect via meta refresh (0 seconds delay) -->
    <meta http-equiv="refresh" content="0; url=https://dbport.netlify.app">
    <!-- Optional: Preconnect to the target domain for faster redirect if browser supports it -->
    <link rel="preconnect" href="https://dbport.netlify.app">
    <!-- Fallback JavaScript redirect (ensures compatibility and catches any meta-refresh blockers) -->
    <script>
        // Immediate JavaScript redirect as primary/backup
        (function() {
            // Use replace() to avoid adding the current page to history, keeping navigation clean.
            // This also prevents the user from hitting 'back' to this redirect page easily,
            // which is typical for a seamless redirect.
            window.location.replace("https://dbport.netlify.app");
        })();
    </script>
    <!-- Additional inline style for a subtle loading message (visible only if redirect is delayed,
         e.g., due to network or browser quirks; but normally it will be too fast to notice). -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1e;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #eef2ff;
        }
        .redirect-container {
            text-align: center;
            max-width: 520px;
            width: 100%;
            background: rgba(18, 25, 45, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(255,255,255,0.05) inset;
            border: 1px solid rgba(72, 187, 255, 0.2);
            transition: all 0.2s ease;
        }
        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #C084FC, #60A5FA);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
        }
        .url-badge {
            display: inline-block;
            background: #0f172ad9;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #94a3f8;
            border: 1px solid #2d3a5e;
            margin-bottom: 1.5rem;
            word-break: break-all;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(96, 165, 250, 0.2);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.9s linear infinite;
            margin: 1.2rem auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            font-size: 0.95rem;
            color: #cbd5e6;
            margin-top: 1rem;
            background: #11182780;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }
        .manual-link {
            margin-top: 1.8rem;
            font-size: 0.85rem;
            color: #7e8aa8;
        }
        .manual-link a {
            color: #90cdf4;
            text-decoration: none;
            border-bottom: 1px dotted #3b82f6;
            transition: color 0.2s;
        }
        .manual-link a:hover {
            color: #c4b5fd;
            border-bottom-color: #c084fc;
        }
        /* For very old browsers that might not support backdrop-filter, solid fallback */
        @supports not (backdrop-filter: blur(8px)) {
            .redirect-container {
                background: #111827;
            }
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <h1>⟳ DBPort</h1>
        <div class="url-badge">dbport.netlify.app</div>
        <div class="loader" aria-label="Loading, redirecting in progress"></div>
        <div class="message">
            ⚡ Redirecting you to the destination...
        </div>
        <div class="manual-link">
            If you are not automatically redirected, 
            <a href="https://dbport.netlify.app" id="manual-redirect-link">click here</a>
        </div>
    </div>

    <!-- Extra safety: in case the script fails due to any edge-case (like if 'replace' is blocked or overridden),
         we add a small fallback listener to the manual link. Also a very robust delayed redirect guard. -->
    <script>
        (function ensureRedirect() {
            // Already executed window.location.replace earlier, but just to be extra safe:
            // Some browsers might block initial script if it's too early? Very unlikely, but we add a second attempt
            // using a timeout, but only if we are still on the page after 50ms.
            let redirectExecuted = false;
            
            // Mark that we've attempted primary redirect.
            // The replace() call at the top already runs synchronously; but if somehow it failed (e.g., replace not allowed),
            // we try again.
            const currentUrl = window.location.href;
            // If the current URL is not already the target (prevent loops)
            if (!currentUrl.includes('dbport.netlify.app')) {
                // Ensure that the window location is not already navigating
                setTimeout(function() {
                    if (!redirectExecuted && window.location.href === currentUrl) {
                        // Still on same page → try replace again
                        window.location.replace("https://dbport.netlify.app");
                        redirectExecuted = true;
                    }
                }, 30);
            } else {
                // already at destination? shouldn't happen but fine.
                redirectExecuted = true;
            }
            
            // Also ensure manual link uses same replace semantics for consistent UX
            const manualLink = document.getElementById('manual-redirect-link');
            if (manualLink) {
                manualLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.replace("https://dbport.netlify.app");
                });
            }
        })();
    </script>
    <!-- Note: The meta refresh and JS redirects are both present; 
         the JS will fire instantly and override meta in most cases, 
         but meta refresh acts as a final failsafe. Additionally,
         preconnect hint speeds up TLS/connection if redirect takes any time. -->
</body>
</html>
